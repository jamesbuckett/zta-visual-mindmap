<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ZTA Visual Mindmap — Zero-Trust, Networking &amp; IT Terms, Mapped</title>
  <meta name="description" content="An interactive force-directed mindmap of 41 zero-trust, networking, and IT terms — colour-coded by category, with typed relationships, search, filters, and a guided tour. Built from the ZTA Visual Glossary by James Buckett.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+Mono&display=swap" rel="stylesheet">

  <style>
    /* ==================================================================
       Design tokens — palette / spacing / type (skill-style-guide chassis)
       ================================================================== */
    :root {
      --bg: #FAFAFA;
      --surface: #FFFFFF;
      --text: #0A0A0A;
      --text-muted: #6B7280;
      --border: #E5E7EB;
      --border-strong: #D1D5DB;

      /* Exactly ONE brand accent. Alternatives commented. */
      /* --accent: #2563EB; */
      --accent: #4F46E5;        /* indigo */
      /* --accent: #059669; */
      /* --accent: #EA580C; */
      --accent-hover: color-mix(in srgb, var(--accent) 88%, black);
      --accent-soft: color-mix(in srgb, var(--accent) 12%, var(--bg));

      /* Categorical (data-viz) palette — used ONLY for node categories + legend. */
      --cat-1: #DC2626;  /* red */
      --cat-2: #EA580C;  /* orange  -> Development Framework */
      --cat-3: #CA8A04;  /* yellow */
      --cat-4: #16A34A;  /* green   -> Network Technology */
      --cat-5: #2563EB;  /* blue    -> Protocol */
      --cat-6: #4F46E5;  /* indigo */
      --cat-7: #7C3AED;  /* violet  -> Security Technology */

      /* Spacing scale: 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64 / 96 */
      --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
      --space-5: 24px; --space-6: 32px; --space-7: 48px; --space-8: 64px; --space-9: 96px;

      --font-sans: "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --font-mono: "Noto Sans Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --fs-body: 16px;
      --fs-mono: 13px;
      --fs-small: 13px;
      --fs-tiny: 11.5px;
      --leading-body: 1.55;
      --leading-tight: 1.2;
      --tracking-tight: -0.02em;

      --radius: 8px;
      --radius-lg: 12px;
      --shadow-sm: 0 1px 2px rgba(10, 10, 10, 0.04);
      --shadow: 0 1px 3px rgba(10, 10, 10, 0.08), 0 1px 2px rgba(10, 10, 10, 0.04);
      --shadow-lg: 0 10px 30px rgba(10, 10, 10, 0.12), 0 2px 8px rgba(10,10,10,0.06);
      --transition: 170ms ease;

      /* category -> node colour resolver (set per .node via category class) */
      --node: var(--cat-5);
    }

    [data-theme="dark"] {
      --bg: #0B0B0C;
      --surface: #161618;
      --text: #F5F5F5;
      --text-muted: #9CA3AF;
      --border: #27272A;
      --border-strong: #3F3F46;
      --accent-soft: color-mix(in srgb, var(--accent) 22%, var(--bg));
      --cat-1: #F87171;
      --cat-2: #FB923C;
      --cat-3: #FACC15;
      --cat-4: #4ADE80;
      --cat-5: #60A5FA;
      --cat-6: #818CF8;
      --cat-7: #A78BFA;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.4);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.55), 0 1px 2px rgba(0, 0, 0, 0.35);
      --shadow-lg: 0 12px 34px rgba(0,0,0,0.6), 0 2px 10px rgba(0,0,0,0.4);
    }

    /* family colour map (the one place families bind to --cat-* / ink) */
    .fam-ztcore        { --node: var(--text); }
    .fam-iam           { --node: var(--cat-1); }
    .fam-securechannel { --node: var(--cat-2); }
    .fam-transport     { --node: var(--cat-5); }
    .fam-routing       { --node: var(--cat-4); }
    .fam-edge          { --node: var(--cat-3); }
    .fam-platform      { --node: var(--cat-7); }

    /* ================================ base ============================== */
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; height: 100%; }
    body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: var(--fs-body);
      line-height: var(--leading-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background-color var(--transition), color var(--transition);
    }
    h1, h2, h3, h4 { font-weight: 700; letter-spacing: var(--tracking-tight); line-height: var(--leading-tight); margin: 0; }
    p { margin: 0; }
    a { color: var(--accent); text-decoration: none; transition: color var(--transition); }
    a:hover { color: var(--accent-hover); }
    code, kbd { font-family: var(--font-mono); font-size: var(--fs-mono); }
    button { font-family: inherit; }
    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; overflow: hidden; clip: rect(0 0 0 0); clip-path: inset(50%); white-space: nowrap; border: 0; }

    /* ============================== app bar ============================= */
    .appbar {
      flex: 0 0 auto;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: saturate(180%) blur(8px);
      border-bottom: 1px solid var(--border);
      z-index: 30;
    }
    .appbar-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
    }
    .brand { display: inline-flex; align-items: center; gap: var(--space-2); font-weight: 700; letter-spacing: var(--tracking-tight); color: var(--text); white-space: nowrap; }
    .brand-mark { display: inline-grid; place-items: center; width: 30px; height: 30px; border-radius: 7px; background: var(--accent); color: #fff; flex: 0 0 auto; }
    .brand-mark svg { width: 17px; height: 17px; }
    .brand-name { font-size: 15px; }
    .brand-name .sub { color: var(--text-muted); font-weight: 500; }

    .search { position: relative; flex: 1 1 auto; max-width: 420px; margin-inline: auto; }
    .search svg.search-ic { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-muted); pointer-events: none; }
    .search input {
      width: 100%; height: 38px; padding: 0 var(--space-6);
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 999px;
      font-size: var(--fs-small); font-family: inherit;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .search input::placeholder { color: var(--text-muted); }
    .search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .search-clear { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); display: none; place-items: center; width: 24px; height: 24px; border: 0; background: transparent; color: var(--text-muted); border-radius: 50%; cursor: pointer; }
    .search-clear svg { width: 15px; height: 15px; }
    .search.has-value .search-clear { display: grid; }

    .appbar-actions { display: flex; align-items: center; gap: var(--space-2); flex: 0 0 auto; }
    .btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      height: 38px; padding: 0 var(--space-3);
      font-size: var(--fs-small); font-weight: 700; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      cursor: pointer; white-space: nowrap;
      transition: background-color var(--transition), border-color var(--transition), color var(--transition);
    }
    .btn:hover { border-color: var(--border-strong); background: color-mix(in srgb, var(--surface) 80%, var(--bg)); }
    .btn svg { width: 16px; height: 16px; }
    .btn-accent { background: var(--accent); color: #fff; border-color: transparent; }
    .btn-accent:hover { background: var(--accent-hover); color: #fff; }
    .icon-button { display: inline-grid; place-items: center; width: 38px; height: 38px; padding: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; transition: background-color var(--transition), border-color var(--transition); }
    .icon-button:hover { border-color: var(--border-strong); }
    .icon-button svg { width: 18px; height: 18px; }
    [data-theme="light"] #icon-moon { display: block; } [data-theme="light"] #icon-sun { display: none; }
    [data-theme="dark"]  #icon-moon { display: none; }  [data-theme="dark"]  #icon-sun  { display: block; }

    .branding { display: flex; align-items: center; gap: var(--space-1); list-style: none; margin: 0; padding: 0; }
    .branding a { display: inline-grid; place-items: center; width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); transition: color var(--transition), border-color var(--transition); }
    .branding a:hover { color: var(--text); border-color: var(--border-strong); }
    .branding svg { width: 16px; height: 16px; }

    /* ============================== toolbar ============================ */
    .toolbar { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-2) var(--space-4); border-top: 1px solid var(--border); overflow-x: auto; }
    .filters { display: flex; align-items: center; gap: var(--space-2); }
    .filters-label { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); font-weight: 700; margin-right: var(--space-1); }
    .chip {
      display: inline-flex; align-items: center; gap: var(--space-2);
      height: 30px; padding: 0 var(--space-3);
      font-size: var(--fs-small); font-weight: 500; color: var(--text);
      background: var(--surface); border: 1px solid var(--border); border-radius: 999px;
      cursor: pointer; white-space: nowrap; transition: border-color var(--transition), background-color var(--transition), opacity var(--transition);
    }
    .chip .swatch { width: 10px; height: 10px; border-radius: 50%; background: var(--node); flex: 0 0 auto; }
    .chip[aria-pressed="false"] { opacity: 0.45; }
    .chip:hover { border-color: var(--border-strong); }
    .toolbar-spacer { flex: 1 1 auto; min-width: var(--space-2); }
    .view-actions { display: flex; align-items: center; gap: var(--space-2); }

    /* ============================== main =============================== */
    .app { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 384px; min-height: 0; }
    .graph-wrap { position: relative; min-width: 0; overflow: hidden; }
    #graph { position: absolute; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; cursor: grab; background:
        radial-gradient(circle at 1px 1px, color-mix(in srgb, var(--text) 7%, transparent) 1px, transparent 0) 0 0 / 26px 26px; }
    #graph.panning { cursor: grabbing; }

    /* edges */
    .edge { fill: none; stroke: var(--text-muted); stroke-width: 1.4; opacity: 0.5; transition: opacity 120ms ease, stroke 120ms ease; }
    .edge.t-partof   { stroke: var(--accent); stroke-width: 2.1; opacity: 0.72; }
    .edge.t-requires { stroke: var(--text-muted); stroke-width: 1.7; opacity: 0.6; }
    .edge.t-enables  { stroke: var(--text-muted); stroke-width: 1.6; opacity: 0.6; stroke-dasharray: 5 4; }
    .edge.t-alternative { stroke: var(--border-strong); stroke-width: 1.5; opacity: 0.7; stroke-dasharray: 8 5; }
    .edge.t-samecategory { stroke: var(--border-strong); stroke-width: 1.3; opacity: 0.5; stroke-dasharray: 1 5; stroke-linecap: round; }
    .graph-focus .edge { opacity: 0.06; }
    .graph-focus .edge.is-hot { opacity: 0.95; stroke: var(--accent); }
    .edge.t-samecategory.is-hot, .edge.t-alternative.is-hot { stroke: var(--accent); }

    /* nodes */
    .node { cursor: pointer; }
    .node .halo { fill: none; stroke: var(--accent); stroke-width: 3; opacity: 0; transition: opacity 120ms ease; }
    .node .dot { fill: var(--node); stroke: var(--surface); stroke-width: 2; transition: stroke 150ms ease; }
    .node .label {
      font-family: var(--font-sans); font-size: 11px; font-weight: 700; fill: var(--text);
      text-anchor: middle; paint-order: stroke; stroke: var(--bg); stroke-width: 3.5px; stroke-linejoin: round;
      pointer-events: none; transition: opacity 120ms ease;
    }
    .node:hover .dot, .node:focus-visible .dot { stroke: var(--accent); }
    .node:focus-visible { outline: none; }
    .node:focus-visible .halo { opacity: 0.5; }
    .node.is-selected .halo { opacity: 1; }
    .node.is-selected .dot { stroke: var(--accent); stroke-width: 2.5; }
    .graph-focus .node { opacity: 0.22; }
    .graph-focus .node.is-hot { opacity: 1; }
    .graph-dim-unmatched .node:not(.is-match) { opacity: 0.12; }
    .graph-dim-unmatched .node.is-match .dot { stroke: var(--accent); }
    .node.is-hidden, .edge.is-hidden { display: none; }

    /* legend */
    .legend {
      position: absolute; left: var(--space-3); bottom: var(--space-3);
      background: color-mix(in srgb, var(--surface) 88%, transparent);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: var(--radius-lg);
      box-shadow: var(--shadow); padding: var(--space-3);
      max-width: 250px; font-size: var(--fs-tiny); z-index: 10;
    }
    .legend h4 { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: var(--space-2); }
    .legend-row { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-1); color: var(--text); }
    .legend-row .swatch { width: 11px; height: 11px; border-radius: 50%; flex: 0 0 auto; }
    .legend-edges { margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px solid var(--border); display: none; }
    .legend.show-edges .legend-edges { display: block; }
    .legend-edge { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-1); }
    .legend-edge svg { width: 34px; height: 10px; flex: 0 0 auto; }
    .legend-toggle { margin-top: var(--space-2); background: none; border: 0; color: var(--accent); font-size: var(--fs-tiny); font-weight: 700; cursor: pointer; padding: 0; }

    /* zoom controls */
    .zoom-controls { position: absolute; right: var(--space-3); bottom: var(--space-3); display: flex; flex-direction: column; z-index: 10; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow-sm); }
    .zoom-controls button { width: 36px; height: 36px; display: grid; place-items: center; background: transparent; border: 0; color: var(--text); cursor: pointer; transition: background-color var(--transition); }
    .zoom-controls button:hover { background: var(--accent-soft); }
    .zoom-controls button + button { border-top: 1px solid var(--border); }
    .zoom-controls svg { width: 17px; height: 17px; }

    /* tooltip */
    .tooltip {
      position: absolute; z-index: 40; pointer-events: none; opacity: 0;
      max-width: 260px; padding: var(--space-2) var(--space-3);
      background: var(--text); color: var(--bg);
      border-radius: 8px; box-shadow: var(--shadow-lg);
      font-size: var(--fs-small); line-height: 1.45;
      transform: translate(-50%, calc(-100% - 10px)); transition: opacity 110ms ease;
    }
    .tooltip strong { display: block; font-size: var(--fs-small); margin-bottom: var(--space-1); }
    .tooltip .tt-cat { color: color-mix(in srgb, var(--bg) 70%, var(--text-muted)); font-weight: 500; }
    .tooltip.show { opacity: 1; }

    /* tour bar */
    .tour-bar {
      position: absolute; left: 50%; bottom: var(--space-3); transform: translateX(-50%);
      width: min(540px, calc(100% - var(--space-6)));
      background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg); padding: var(--space-3) var(--space-4); z-index: 20;
    }
    .tour-bar[hidden] { display: none; }
    .tour-head { display: flex; align-items: center; justify-content: space-between; gap: var(--space-3); margin-bottom: var(--space-1); }
    .tour-step { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); font-weight: 700; }
    .tour-title { font-size: 15px; font-weight: 700; }
    .tour-note { font-size: var(--fs-small); color: var(--text-muted); margin-bottom: var(--space-3); }
    .tour-actions { display: flex; align-items: center; gap: var(--space-2); }
    .tour-actions .btn { height: 32px; }
    .tour-progress { flex: 1 1 auto; height: 4px; background: var(--border); border-radius: 999px; overflow: hidden; }
    .tour-progress span { display: block; height: 100%; background: var(--accent); transition: width 200ms ease; }

    /* ============================== panel ============================== */
    .panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; }
    .panel-inner { padding: var(--space-5); }

    .panel-close { display: none; }

    .about-eyebrow { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; margin-bottom: var(--space-2); }
    .about h2 { font-size: 20px; margin-bottom: var(--space-3); }
    .about p { color: var(--text-muted); font-size: var(--fs-small); margin-bottom: var(--space-3); }
    .about p strong { color: var(--text); font-weight: 700; }
    .about-how { list-style: none; padding: 0; margin: var(--space-3) 0; display: grid; gap: var(--space-2); }
    .about-how li { display: flex; align-items: center; gap: var(--space-2); font-size: var(--fs-small); color: var(--text); }
    .about-how svg { width: 16px; height: 16px; color: var(--accent); flex: 0 0 auto; }
    .about-cta { width: 100%; justify-content: center; margin-top: var(--space-2); }
    .stat-row { display: flex; gap: var(--space-2); margin: var(--space-4) 0; }
    .stat { flex: 1 1 0; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-3); text-align: center; }
    .stat b { display: block; font-size: 22px; line-height: 1.1; }
    .stat span { font-size: var(--fs-tiny); color: var(--text-muted); }

    /* detail */
    .detail-back { display: inline-flex; align-items: center; gap: var(--space-1); background: none; border: 0; color: var(--text-muted); font-size: var(--fs-small); font-weight: 700; cursor: pointer; padding: 0; margin-bottom: var(--space-4); }
    .detail-back:hover { color: var(--text); }
    .detail-back svg { width: 15px; height: 15px; }
    .detail-eyebrow { display: flex; flex-wrap: wrap; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); }
    .cat-badge { display: inline-flex; align-items: center; gap: var(--space-2); font-size: var(--fs-tiny); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .cat-badge .swatch { width: 10px; height: 10px; border-radius: 50%; background: var(--node); }
    .detail h2 { font-size: 24px; margin-bottom: var(--space-1); }
    .detail-full { font-size: var(--fs-small); color: var(--text-muted); margin-bottom: var(--space-4); }
    .detail-full .alias { color: var(--text-muted); }
    .tldr { background: var(--accent-soft); border-radius: var(--radius); padding: var(--space-3) var(--space-4); margin-bottom: var(--space-4); }
    .tldr .lbl { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); font-weight: 700; display: block; margin-bottom: var(--space-1); }
    .tldr p { font-size: var(--fs-small); color: var(--text); font-weight: 500; }
    .detail-explainer { font-size: var(--fs-body); color: var(--text); line-height: 1.6; margin-bottom: var(--space-5); }
    .meta-row { display: flex; flex-wrap: wrap; gap: var(--space-2); margin-bottom: var(--space-5); }
    .tag { display: inline-flex; align-items: center; gap: var(--space-2); height: 26px; padding: 0 var(--space-3); border: 1px solid var(--border); border-radius: 999px; font-size: var(--fs-tiny); font-weight: 500; color: var(--text); }
    .tag .swatch { width: 8px; height: 8px; border-radius: 50%; }
    .tag.prov { background: var(--bg); color: var(--text-muted); }
    .tag.prov svg { width: 13px; height: 13px; }

    .section-label { font-size: var(--fs-tiny); text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); font-weight: 700; margin-bottom: var(--space-3); }
    .rel-group { margin-bottom: var(--space-4); }
    .rel-group-head { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-2); }
    .rel-line { width: 26px; height: 10px; flex: 0 0 auto; }
    .rel-phrase { font-size: var(--fs-tiny); color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .rel-list { display: flex; flex-direction: column; gap: var(--space-1); }
    .rel-item {
      display: flex; align-items: center; gap: var(--space-2);
      width: 100%; text-align: left; padding: var(--space-2) var(--space-3);
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: var(--fs-small); font-weight: 500; cursor: pointer;
      transition: border-color var(--transition), background-color var(--transition);
    }
    .rel-item:hover { border-color: var(--accent); background: var(--accent-soft); }
    .rel-item .swatch { width: 9px; height: 9px; border-radius: 50%; background: var(--node); flex: 0 0 auto; }
    .rel-item .rel-name { flex: 1 1 auto; }
    .rel-item .rel-arrow { color: var(--text-muted); width: 15px; height: 15px; flex: 0 0 auto; }

    /* ============================== footer ============================= */
    .appfoot { flex: 0 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-2); padding: var(--space-2) var(--space-4); border-top: 1px solid var(--border); font-size: var(--fs-tiny); color: var(--text-muted); }
    .appfoot a { font-weight: 700; }
    .appfoot .credit { display: inline-flex; align-items: center; gap: var(--space-2); }

    /* ============================ responsive =========================== */
    .scrim { display: none; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      .panel {

        if (!groups[type]) return;
        const items = groups[type].sort((a, b) => a.other.name.localeCompare(b.other.name)).map((c) => {
          return '<button class="rel-item fam-' + famOf(c.other.id) + '" data-goto="' + c.other.id + '">' +
            '<span class="swatch"></span><span class="rel-name">' + esc(c.other.name) + '</span>' + ARROW_SVG + '</button>';
        }).join('');
        // phrasing: use the first connection's direction is per-item, but group label is by type from focus perspective.
        // Show the directional phrase by sampling out/in within the type group when mixed.
        const phrases = new Set(groups[type].map((c) => PHRASE[type][c.dir]));
        const phraseLabel = Array.from(phrases).join(' / ');
        relHTML += '<div class="rel-group"><div class="rel-group-head">' + relMiniLine(type) +
          '<span class="rel-phrase">' + esc(phraseLabel) + '</span></div><div class="rel-list">' + items + '</div></div>';
      });

      const aliasHTML = n.aliases && n.aliases.length ? ' <span class="alias">· also: ' + esc(n.aliases.join(', ')) + '</span>' : '';
      // source glossary types preserved as neutral pills (the family is the colour layer)
      const typeTags = n.types.map((t) => '<span class="tag">' + esc(t) + '</span>').join('');
      const provTag = '<span class="tag prov">' + (PROV_ICON[n.provenance] || '') + esc(n.provenance) + '</span>';

      panelInner.innerHTML =
        '<button class="detail-back" id="detail-back" type="button">' +
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>All terms</button>' +
        '<div class="detail fam-' + fk + '">' +
          '<div class="detail-eyebrow"><span class="cat-badge"><span class="swatch"></span>' + esc(famMeta(fk).label) + '</span></div>' +
          '<h2>' + esc(n.name) + '</h2>' +
          '<p class="detail-full">' + esc(n.fullName) + aliasHTML + '</p>' +
          '<div class="tldr"><span class="lbl">TL;DR</span><p>' + esc(n.tldr) + '</p></div>' +
          '<p class="detail-explainer">' + esc(n.explainer) + '</p>' +
          '<div class="section-label">Glossary type &amp; provenance</div>' +
          '<div class="meta-row">' + typeTags + provTag + '</div>' +
          '<div class="section-label">Connections · ' + conns.length + '</div>' + relHTML +
        '</div>';
      panelInner.querySelector('#detail-back').addEventListener('click', () => { select(null); renderAbout(); });
      panelInner.querySelectorAll('[data-goto]').forEach((b) => b.addEventListener('click', () => select(b.dataset.goto)));
      panel.scrollTop = 0;
    }

    function renderAbout() {
      panelInner.innerHTML =
        '<div class="about">' +
          '<div class="about-eyebrow">Interactive mindmap</div>' +
          '<h2>How the internet keeps its secrets — mapped</h2>' +
          '<p><strong>41 terms</strong> from the ZTA Visual Glossary, drawn as a force-directed graph. Each <strong>node</strong> is a term, grouped into <strong>seven functional families</strong> by colour; each <strong>link</strong> is a typed relationship inferred from the glossary\'s own explainers.</p>' +
          '<p class="about-text-extra">The dark <strong>Zero-Trust core</strong> settles at the centre, with the identity, secure-channel, transport, routing, network-edge, and platform families clustered around it. Every term\'s original glossary type and provenance stay in its detail panel.</p>' +
          '<div class="stat-row">' +
            '<div class="stat"><b>41</b><span>terms</span></div>' +
            '<div class="stat"><b>7</b><span>families</span></div>' +
            '<div class="stat"><b>90</b><span>links</span></div>' +
          '</div>' +
          '<div class="section-label">How to use it</div>' +
          '<ul class="about-how">' +
            '<li>' + ICON('mouse-pointer') + '<span><strong>Click</strong> any node for its definition and connections.</span></li>' +
            '<li>' + ICON('spotlight') + '<span><strong>Hover</strong> to spotlight a term and its direct neighbours.</span></li>' +
            '<li>' + ICON('search') + '<span><strong>Search</strong> to locate and filter terms live.</span></li>' +
            '<li>' + ICON('filter') + '<span><strong>Toggle families</strong> in the toolbar to focus a group.</span></li>' +
            '<li>' + ICON('drag') + '<span><strong>Drag</strong> the canvas to pan, scroll to zoom, drag a node to reposition.</span></li>' +
          '</ul>' +
          '<button class="btn btn-accent about-cta" id="about-tour" type="button">' + ICON('route') + 'Take the guided tour</button>' +
        '</div>';
      panelInner.querySelector('#about-tour').addEventListener('click', startTour);
      panel.scrollTop = 0;
    }

    function ICON(name) {
      const I = {
        'mouse-pointer': '<path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/>',
        'spotlight': '<circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/>',
        'search': '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>',
        'filter': '<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>',
        'drag': '<polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/>',
        'route': '<circle cx="6" cy="19" r="3"/><path d="M9 19h8.5a3.5 3.5 0 0 0 0-7h-11a3.5 3.5 0 0 1 0-7H15"/><circle cx="18" cy="5" r="3"/>',
      };
      return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + (I[name] || '') + '</svg>';
    }

    /* --------------------------- selection --------------------------- */
    function select(id, opts) {
      opts = opts || {};
      if (id && byId.get(id)) {
        if (tourActive && !opts.fromTour) exitTour();
        selectedId = id;
        nodes.forEach((n) => n.el.classList.toggle('is-selected', n.id === id));
        highlightNeighbors(id);
        renderDetail(byId.get(id));
        if (!opts.noCenter) centerOn(byId.get(id), Math.max(view.k, 1.15));
        if (!opts.silentPanel) openPanelMobile();
      } else {
        selectedId = null;
        nodes.forEach((n) => n.el.classList.remove('is-selected'));
        clearHot();
      }
    }

    /* ---------------------------- search ----------------------------- */
    const searchWrap = document.getElementById('search');
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    function doSearch(q) {
      q = (q || '').trim().toLowerCase();
      searchWrap.classList.toggle('has-value', q.length > 0);
      if (!q) { svg.classList.remove('graph-dim-unmatched'); nodes.forEach((n) => n.el.classList.remove('is-match')); return; }
      svg.classList.add('graph-dim-unmatched');
      let matches = [];
      nodes.forEach((n) => {
        const hay = (n.name + ' ' + n.fullName + ' ' + (n.aliases || []).join(' ') + ' ' + n.tldr + ' ' + n.category + ' ' + famMeta(n.family).label).toLowerCase();
        const hit = !n.hidden && hay.indexOf(q) >= 0;
        n.el.classList.toggle('is-match', hit);
        if (hit) matches.push(n);
      });
      if (matches.length === 1) centerOn(matches[0], Math.max(view.k, 1.2));
      else if (matches.length > 1) fitMatches(matches);
    }
    function fitMatches(ms) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      ms.forEach((n) => { minX = Math.min(minX, n.x); minY = Math.min(minY, n.y); maxX = Math.max(maxX, n.x); maxY = Math.max(maxY, n.y); });
      const bw = Math.max(maxX - minX, 1), bh = Math.max(maxY - minY, 1);
      const k = Math.min((W - 160) / bw, (H - 160) / bh, 1.8);
      view.k = Math.max(0.4, k); view.x = W / 2 - ((minX + maxX) / 2) * view.k; view.y = H / 2 - ((minY + maxY) / 2) * view.k; applyTransform();
    }
    searchInput.addEventListener('input', (e) => doSearch(e.target.value));
    searchClear.addEventListener('click', () => { searchInput.value = ''; doSearch(''); searchInput.focus(); });
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { const m = nodes.find((n) => n.el.classList.contains('is-match')); if (m) select(m.id); }
      if (e.key === 'Escape') { searchInput.value = ''; doSearch(''); }
    });

    /* ---------------------------- filters ---------------------------- */
    const active = new Set(FAMILIES.map((f) => f.key));
    const filtersEl = document.getElementById('filters');
    FAMILIES.forEach((f) => {
      const b = document.createElement('button');
      b.className = 'chip fam-' + f.key; b.type = 'button'; b.dataset.fam = f.key;
      b.setAttribute('aria-pressed', 'true');
      b.title = f.label;
      b.innerHTML = '<span class="swatch"></span>' + f.short;
      b.addEventListener('click', () => toggleCat(f.key, b));
      filtersEl.appendChild(b);
    });
    function applyVisibility() {
      nodes.forEach((n) => { n.hidden = !active.has(n.family); n.el.classList.toggle('is-hidden', n.hidden); });
      edges.forEach((e) => e.el.classList.toggle('is-hidden', e.s.hidden || e.t.hidden));
      if (selectedId && byId.get(selectedId).hidden) { select(null); renderAbout(); }
      refreshHot();
      reheat(0.3);
    }
    function toggleCat(key, btn) {
      if (active.has(key)) { if (active.size > 1) active.delete(key); else return; } else active.add(key);
      btn.setAttribute('aria-pressed', active.has(key) ? 'true' : 'false');
      applyVisibility();
      if (searchInput.value) doSearch(searchInput.value);
    }

    /* --------------------------- legend ------------------------------ */
    const legendCats = document.getElementById('legend-cats');
    FAMILIES.forEach((f) => {
      const row = document.createElement('div');
      row.className = 'legend-row';
      row.innerHTML = '<span class="swatch" style="background:var(' + f.cssvar + ')"></span>' + f.label;
      legendCats.appendChild(row);
    });
    const legendEdges = document.getElementById('legend-edges');
    ORDER.forEach((type) => {
      const m = EDGE_META[type];
      const row = document.createElement('div');
      row.className = 'legend-edge';
      row.innerHTML = relMiniLine(type) + '<span>' + m.key + '</span>';
      legendEdges.appendChild(row);
    });
    const legend = document.getElementById('legend');
    const legendToggle = document.getElementById('legend-toggle');
    legendToggle.addEventListener('click', () => {
      const on = legend.classList.toggle('show-edges');
      legendToggle.setAttribute('aria-expanded', on ? 'true' : 'false');
      legendToggle.textContent = on ? 'Hide relationship key' : 'Show relationship key';
    });

    /* ---------------------------- tooltip ---------------------------- */
    const tooltip = document.getElementById('tooltip');
    function showTip(n, clientX, clientY) {
      const rect = svg.getBoundingClientRect();
      tooltip.innerHTML = '<strong>' + esc(n.name) + ' <span class="tt-cat">· ' + esc(famMeta(n.family).label) + '</span></strong>' + esc(n.tldr);
      tooltip.style.left = (clientX - rect.left) + 'px';
      tooltip.style.top = (clientY - rect.top) + 'px';
      tooltip.classList.add('show');
    }
    function hideTip() { tooltip.classList.remove('show'); }

    /* ------------------- pointer: pan / zoom / drag ------------------ */
    let dragNode = null, panning = false, last = null, downAt = null, moved = false;
    function clientToWorld(cx, cy) { const rect = svg.getBoundingClientRect(); return { x: (cx - rect.left - view.x) / view.k, y: (cy - rect.top - view.y) / view.k }; }

    svg.addEventListener('pointerdown', (e) => {
      const g = e.target.closest('.node');
      downAt = { x: e.clientX, y: e.clientY }; moved = false;
      if (g) {
        dragNode = byId.get(g.dataset.id);
        const w = clientToWorld(e.clientX, e.clientY);
        dragNode.fx = dragNode.x; dragNode.fy = dragNode.y; dragNode._ox = w.x - dragNode.x; dragNode._oy = w.y - dragNode.y;
      } else {
        panning = true; last = { x: e.clientX, y: e.clientY }; svg.classList.add('panning');
      }
      svg.setPointerCapture(e.pointerId);
    });
    svg.addEventListener('pointermove', (e) => {
      if (downAt && (Math.abs(e.clientX - downAt.x) + Math.abs(e.clientY - downAt.y)) > 4) moved = true;
      if (dragNode) {
        const w = clientToWorld(e.clientX, e.clientY);
        dragNode.fx = w.x - dragNode._ox; dragNode.fy = w.y - dragNode._oy;
        reheat(0.15);
      } else if (panning) {
        view.x += e.clientX - last.x; view.y += e.clientY - last.y; last = { x: e.clientX, y: e.clientY }; applyTransform();
      } else {
        const g = e.target.closest('.node');
        if (g) { const n = byId.get(g.dataset.id); showTip(n, e.clientX, e.clientY); if (!selectedId) { svg.classList.add('graph-focus'); highlightNeighbors(n.id); } }
        else { hideTip(); if (!selectedId) clearHot(); }
      }
    });
    function endPointer(e) {
      if (dragNode) { dragNode.fx = null; dragNode.fy = null; if (!moved) select(dragNode.id); dragNode = null; }
      else if (panning && !moved && e && e.target === svg) { /* click empty space */ }
      panning = false; svg.classList.remove('panning'); downAt = null;
      try { svg.releasePointerCapture(e.pointerId); } catch (_) {}
    }
    svg.addEventListener('pointerup', endPointer);
    svg.addEventListener('pointercancel', endPointer);
    svg.addEventListener('pointerleave', () => { hideTip(); if (!selectedId) clearHot(); });

    svg.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = svg.getBoundingClientRect();
      const px = e.clientX - rect.left, py = e.clientY - rect.top;
      const factor = Math.exp(-e.deltaY * 0.0014);
      const nk = Math.max(0.25, Math.min(3.2, view.k * factor));
      view.x = px - (px - view.x) * (nk / view.k);
      view.y = py - (py - view.y) * (nk / view.k);
      view.k = nk; applyTransform();
    }, { passive: false });

    /* node keyboard interaction (click handled via pointer; keys for a11y) */
    nodesLayer.addEventListener('keydown', (e) => {
      const g = e.target.closest('.node'); if (!g) return;
      const n = byId.get(g.dataset.id);
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); select(n.id); }
      else if (e.key.startsWith('Arrow')) {
        e.preventDefault();
        const neigh = adj.get(n.id).map((a) => a.other).filter((o) => !o.hidden);
        if (neigh.length) { neigh.sort((a, b) => a.name.localeCompare(b.name)); const nx = neigh[0]; nx.el.focus(); }
      }
    });
    nodesLayer.addEventListener('focusin', (e) => {
      const g = e.target.closest('.node'); if (!g) return; const n = byId.get(g.dataset.id);
      if (!selectedId) { svg.classList.add('graph-focus'); highlightNeighbors(n.id); }
      const r = g.getBoundingClientRect(); showTip(n, r.left + r.width / 2, r.top + r.height / 2);
    });
    nodesLayer.addEventListener('focusout', () => { hideTip(); if (!selectedId) clearHot(); });

    /* ---------------------------- tour ------------------------------- */
    let tourActive = false, tourIdx = 0;
    const tourBar = document.getElementById('tour-bar');
    function startTour() {
      // ensure all families on so every step is visible
      let changed = false;
      FAMILIES.forEach((f) => { if (!active.has(f.key)) { active.add(f.key); changed = true; } });
      if (changed) { filtersEl.querySelectorAll('.chip').forEach((b) => b.setAttribute('aria-pressed', 'true')); applyVisibility(); }
      searchInput.value = ''; doSearch('');
      tourActive = true; tourIdx = 0; tourBar.hidden = false; showTourStep();
    }
    function showTourStep() {
      const step = TOUR[tourIdx]; const n = byId.get(step.id);
      document.getElementById('tour-step').textContent = 'Step ' + (tourIdx + 1) + ' of ' + TOUR.length;
      document.getElementById('tour-title').textContent = n.name;
      document.getElementById('tour-note').textContent = step.note;
      document.getElementById('tour-progress-bar').style.width = (((tourIdx + 1) / TOUR.length) * 100) + '%';
      document.getElementById('tour-prev').disabled = tourIdx === 0;
      document.getElementById('tour-next').textContent = tourIdx === TOUR.length - 1 ? 'Finish' : 'Next';
      select(step.id, { fromTour: true, silentPanel: true, noCenter: true });
      centerOn(n, 1.3);
    }
    function tourNext() { if (tourIdx < TOUR.length - 1) { tourIdx++; showTourStep(); } else exitTour(); }
    function tourPrev() { if (tourIdx > 0) { tourIdx--; showTourStep(); } }
    function exitTour() { tourActive = false; tourBar.hidden = true; }
    document.getElementById('tour-next').addEventListener('click', tourNext);
    document.getElementById('tour-prev').addEventListener('click', tourPrev);
    document.getElementById('tour-exit').addEventListener('click', () => { exitTour(); select(null); renderAbout(); });
    document.getElementById('tour-btn').addEventListener('click', startTour);
    document.getElementById('about-btn').addEventListener('click', () => { if (tourActive) exitTour(); select(null); renderAbout(); openPanelMobile(); });

    /* --------------------- buttons / misc wiring --------------------- */
    document.getElementById('zoom-in').addEventListener('click', () => zoomBy(1.25));
    document.getElementById('zoom-out').addEventListener('click', () => zoomBy(0.8));
    document.getElementById('zoom-reset').addEventListener('click', () => fitView());
    document.getElementById('fit-btn').addEventListener('click', () => fitView());
    function zoomBy(f) { const nk = Math.max(0.25, Math.min(3.2, view.k * f)); view.x = W / 2 - (W / 2 - view.x) * (nk / view.k); view.y = H / 2 - (H / 2 - view.y) * (nk / view.k); view.k = nk; applyTransform(); }
    document.getElementById('panel-close').addEventListener('click', closePanelMobile);
    document.getElementById('scrim').addEventListener('click', closePanelMobile);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { if (tourActive) exitTour(); if (document.body.classList.contains('panel-open')) closePanelMobile(); }
      if (e.key === '/' && document.activeElement !== searchInput) { e.preventDefault(); searchInput.focus(); }
      if (tourActive && e.key === 'ArrowRight') tourNext();
      if (tourActive && e.key === 'ArrowLeft') tourPrev();
    });

    /* --------------------------- resize ------------------------------ */
    let resizeT = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeT);
      resizeT = setTimeout(() => { W = svg.clientWidth || W; H = svg.clientHeight || H; reheat(0.18); fitView(); }, 160);
    });

    /* ---------------------------- boot ------------------------------- */
    buildSVG();
    W = svg.clientWidth || W; H = svg.clientHeight || H;
    warmup();
    fitView();
    renderAbout();
    if (!reduceMotion) reheat(0.16);

    // public api for screenshots / debugging / agent control
    window.zta = {
      select: (id) => select(id),
      search: (q) => { searchInput.value = q; doSearch(q); },
      clear: () => { searchInput.value = ''; doSearch(''); select(null); renderAbout(); },
      startTour, tourNext, exitTour, fit: () => fitView(),
      data: DATA,
    };
  })();
  </script>
</body>
</html>
